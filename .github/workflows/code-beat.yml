name: Code Beat

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: relferreira/code-beat@main
        with:
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          model: deepseek/deepseek-v4-flash
          max-comments: "8"
